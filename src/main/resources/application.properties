spring.application.name=servixo-backend


spring.datasource.url=jdbc:mysql://localhost:3306/servixo_db
spring.datasource.username=root
spring.datasource.password=Praveen19
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# 🔐 JWT CONFIG (OPTIONAL)
# ===============================
jwt.secret=servixo_secret_key_very_long_for_security
jwt.expiration=3600000


# ===============================
# 🌐 CORS CONFIG (FOR REACT)
# ===============================
spring.mvc.cors.allowed-origins=http://localhost:3000
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*


# ===============================
# 🧾 LOGGING CONFIG
# ===============================
logging.level.org.springframework=INFO
logging.level.com.servixo=DEBUG


# ===============================
# ⚡ HIKARI CONNECTION POOL (OPTIONAL)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000